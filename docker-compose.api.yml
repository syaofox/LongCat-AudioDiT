# LongCat-AudioDiT API Server for Open Source Reader (开源阅读)
# 
# Usage:
#   docker compose -f docker-compose.api.yml up -d
#   docker compose -f docker-compose.api.yml logs -f
#
# API:
#   GET  http://10.10.10.10:7860/?text={{speakText}}&speaker={{参考包名}}&model={{模型}}
#   GET  http://10.10.10.10:7860/health
#   GET  http://10.10.10.10:7860/speakers
#   POST http://10.10.10.10:7860/speakers?package_name=xxx&reference_text=xxx&audio=@file.wav

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        UID: ${PUID:-1000}
        GID: ${PGID:-1000}
        APT_MIRROR: ${APT_MIRROR:-}
        PIP_MIRROR: ${PIP_MIRROR:-}
    image: audiodit-api:latest
    container_name: audiodit-api
    runtime: nvidia
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - AUTO_LOAD_MODEL=true
      - DEFAULT_MODEL=${MODEL:-1B}
      - PORT=7860
      - HOST=0.0.0.0
      - WORKERS=1
      - SAMPLES_DIR=/app/samples
      - OUTPUTS_DIR=/app/outputs
      - MODEL_DIR_1B=/app/models/LongCat-AudioDiT-1B
      - MODEL_DIR_3_5B=/app/models/LongCat-AudioDiT-3.5B-bf16
      - HF_ENDPOINT=${GH_PROXY:+${GH_PROXY}/https://huggingface.co}
    volumes:
      - ./models:/app/models
      - ./outputs:/app/outputs
      - ./samples:/app/samples
      - ./polyphone_rules.json:/app/polyphone_rules.json
      # 开发时使用当前目录的代码，生产环境建议注释掉以使用镜像内的代码
      - ./api_server.py:/app/api_server.py
      - ./utils.py:/app/utils.py
      - ./audiodit:/app/audiodit
    ports:
      - "7860:7860"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    restart: unless-stopped
