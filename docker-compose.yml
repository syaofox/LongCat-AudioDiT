services:
  webui:
    build:
      context: .
      args:
        UID: ${PUID:-1000}
        GID: ${PGID:-1000}
        APT_MIRROR: ${APT_MIRROR:-}
        PIP_MIRROR: ${PIP_MIRROR:-}
        GH_PROXY: ${GH_PROXY:-}
    image: audiodit-webui:latest
    container_name: audiodit-webui
    runtime: nvidia
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
      - ASR_MODEL_PATH=./models/Qwen3-ASR-0.6B-ONNX
      - ASR_QUANT=int4
      - HF_ENDPOINT=${GH_PROXY:+${GH_PROXY}/https://huggingface.co}
    volumes:
      - ./models:/app/models
      - ./outputs:/app/outputs
      - ./assets:/app/assets
      - ./samples:/app/samples
      - ./polyphone_rules.json:/app/polyphone_rules.json
      # 开发时使用当前目录的代码，生产环境建议注释掉以使用镜像内的代码
      - ./webui.py:/app/webui.py
      - ./qwen_asr_onnx.py:/app/qwen_asr_onnx.py
    ports:
      - "7860:7860"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    restart: unless-stopped
