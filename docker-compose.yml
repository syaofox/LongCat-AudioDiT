services:
  webui:
    build: .
    container_name: audiodit-webui
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
    volumes:
      - ./models:/models
      - ./outputs:/app/outputs
      - ./assets:/app/assets
      # webui开发时挂载
      - ./webui.py:/app/webui.py
    ports:
      - "7860:7860"
    restart: unless-stopped
